<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Fitness Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Floating Emojis -->
<div class="emoji-bg">
  <span>🏃</span>
  <span>💪</span>
  <span>🔥</span>
  <span>🚴</span>
  <span>🏋️</span>
  <span>🥗</span>
  <span>⚡</span>
  <span>🏆</span>
</div>

<h1>🏋️ Elite Fitness Tracker</h1>

<div class="top-bar">

  <div>
    🔥 Calories:
    <span id="totalCalories">0</span>
  </div>

  <div>
    🏆 Level:
    <span id="level">1</span>
  </div>

  <div>
    ⭐ XP:
    <span id="xp">0</span>
  </div>

</div>

<div class="glass-card">

  <input
  type="text"
  id="activity"
  placeholder="Workout Activity">

  <input
  type="number"
  id="calories"
  placeholder="Calories Burned">

  <button onclick="addWorkout()">
    ➕ Add Workout
  </button>

</div>

<div class="progress-section">

  <h3>
    🎯 Daily Goal Progress
  </h3>

  <div class="progress-container">

    <div
    class="progress-bar"
    id="progressBar"></div>

  </div>

</div>

<ul id="workoutList"></ul>

<!-- BMI -->
<div class="bmi-card">

  <h2>⚖️ BMI Calculator</h2>

  <input
  type="number"
  id="weight"
  placeholder="Weight (kg)">

  <input
  type="number"
  id="height"
  placeholder="Height (cm)">

  <button onclick="calculateBMI()">
    Calculate BMI
  </button>

  <h3 id="bmiResult"></h3>

</div>

<!-- Motivation -->
<div class="motivation" id="motivation">

  🚀 Push yourself every day!

</div>

<!-- Theme -->
<button class="theme-btn"
onclick="toggleTheme()">

🌙 Toggle Theme

</button>

<script src="script.js"></script>

</body>
</html>
