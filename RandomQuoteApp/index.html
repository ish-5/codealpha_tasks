<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Animated Background -->
<div class="background">
  <div class="blob x1"></div>
  <div class="blob x2"></div>
  <div class="blob x3"></div>
  <div class="blob x4"></div>
</div>

<h1>✨ Elite Quote Generator</h1>

<div class="quote-container">

  <div class="quote-box">

    <p id="quote">
      Click below to generate inspiration 💡
    </p>

    <h3 id="author"></h3>

  </div>

  <div class="buttons">

    <button onclick="newQuote()">
      🔄 New Quote
    </button>

    <button onclick="copyQuote()">
      📋 Copy
    </button>

    <button onclick="speakQuote()">
      🔊 Speak
    </button>

    <button onclick="saveFavorite()">
      ❤️ Favorite
    </button>

    <button onclick="toggleTheme()">
      🌙 Theme
    </button>

  </div>

  <div class="extra-info">

    <div>
      ❤️ Favorites:
      <span id="favCount">0</span>
    </div>

    <div>
      ✨ Mood:
      <span id="mood">Motivated</span>
    </div>

  </div>

</div>

<div class="motivation" id="motivation">
  🚀 Keep shining and growing!
</div>

<script src="script.js"></script>

</body>
</html>
